<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmilMp3Music Offline</title>
    
    <meta name="theme-color" content="#090909">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3844/3844724.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-color: #a855f7;
            --bg-deep: #090909;
            --bg-soft: #121212;
            --bg-card: #1e1e1e;
            --text-main: #ffffff;
            --text-dim: #a7a7a7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        .app-wrapper { display: flex; height: calc(100vh - 95px); }
        .sidebar { width: 260px; background: var(--bg-deep); padding: 24px 16px; display: flex; flex-direction: column; border-right: 1px solid #1a1a1a; }
        .logo-container { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
        .custom-logo { width: 35px; height: 35px; background: linear-gradient(135deg, var(--brand-color), #6366f1); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        
        .content-area { flex: 1; background: linear-gradient(to bottom, #1a1a1a, var(--bg-deep) 50%); overflow-y: auto; padding: 30px; }
        .songs-container { display: grid; gap: 10px; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .song-box { display: flex; align-items: center; gap: 14px; padding: 12px; border-radius: 10px; background: rgba(255,255,255,0.03); margin-bottom: 8px; }
            .song-cover { width: 50px; height: 50px; background: #282828; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
            .content-area { padding: 20px 15px 120px 15px; }
        }

        .bottom-player { position: fixed; bottom: 0; width: 100%; height: 95px; background: #000; border-top: 1px solid #1a1a1a; display: flex; align-items: center; padding: 0 20px; z-index: 1000; }
        .control-center { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .play-circle { background: white; color: black; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        input[type="range"] { width: 100%; max-width: 500px; accent-color: var(--brand-color); height: 4px; cursor: pointer; }
        .upload-btn { background: var(--brand-color); border: none; padding: 12px; border-radius: 25px; color: white; font-weight: bold; cursor: pointer; margin-top: auto; }
        .mobile-add { display: none; position: fixed; right: 20px; bottom: 110px; background: var(--brand-color); width: 55px; height: 55px; border-radius: 50%; justify-content: center; align-items: center; z-index: 999; }
        @media (max-width: 768px) { .mobile-add { display: flex; } }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo-container">
                <div class="custom-logo"><i class="fas fa-headphones-alt" style="color: white;"></i></div>
                <div style="font-weight: 800; font-size: 20px;">EmilMp3Music</div>
            </div>
            <button class="upload-btn" onclick="document.getElementById('fInp').click()">Mahnı Əlavə Et</button>
            <input type="file" id="fInp" accept="audio/*" style="display: none;" onchange="upload()">
        </aside>

        <main class="content-area">
            <h2 id="statusTitle" style="margin-bottom: 20px;">Kitabxanan</h2>
            <div id="songsList" class="songs-container"></div>
        </main>
    </div>

    <div class="mobile-add" onclick="document.getElementById('fInp').click()"><i class="fas fa-plus" style="color: white; font-size: 20px;"></i></div>

    <footer class="bottom-player">
        <div style="width: 30%; display: flex; align-items: center; gap: 10px;">
            <div id="miniCover" class="song-cover" style="width: 40px; height: 40px; background: #222; border-radius: 4px; display: flex; align-items: center; justify-content: center;"><i class="fas fa-music" style="font-size: 12px;"></i></div>
            <div style="overflow: hidden;"><h4 id="trackTitle" style="font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Seçilməyib</h4></div>
        </div>
        <div class="control-center">
            <div style="display: flex; align-items: center; gap: 20px; font-size: 18px;">
                <i class="fas fa-backward-step" onclick="prevSong()"></i>
                <div class="play-circle" onclick="togglePlay()"><i id="playIcon" class="fas fa-play"></i></div>
                <i class="fas fa-forward-step" onclick="nextSong()"></i>
            </div>
            <input type="range" id="prog" value="0" max="100">
        </div>
        <div style="width: 30%;"></div>
    </footer>

    <audio id="mainAudio"></audio>

    <script>
        let db;
        let playlist = [];
        let currentIndex = -1;
        const audio = document.getElementById('mainAudio');
        const playIcon = document.getElementById('playIcon');

        // Baza açılır (Mahnılar bura internetsiz yazılır)
        const request = indexedDB.open("EmilOfflineDB", 2);
        request.onupgradeneeded = e => e.target.result.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
        request.onsuccess = e => { db = e.target.result; loadPlaylist(); };

        function upload() {
            const file = document.getElementById('fInp').files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const tx = db.transaction("songs", "readwrite");
                tx.objectStore("songs").add({ name: file.name.replace('.mp3',''), data: e.target.result });
                tx.oncomplete = loadPlaylist;
            };
            reader.readAsDataURL(file);
        }

        function loadPlaylist() {
            playlist = [];
            const listUI = document.getElementById('songsList');
            listUI.innerHTML = "";
            db.transaction("songs").objectStore("songs").openCursor().onsuccess = e => {
                const cursor = e.target.result;
                if (cursor) {
                    playlist.push(cursor.value);
                    const idx = playlist.length - 1;
                    const div = document.createElement('div');
                    div.className = 'song-box';
                    div.innerHTML = `<div class="song-cover"><i class="fas fa-music"></i></div><div><h4>${cursor.value.name}</h4></div>`;
                    div.onclick = () => playSong(idx);
                    listUI.appendChild(div);
                    cursor.continue();
                }
            };
        }

        function playSong(index) {
            currentIndex = index;
            audio.src = playlist[currentIndex].data;
            audio.play();
            document.getElementById('trackTitle').innerText = playlist[currentIndex].name;
            playIcon.className = "fas fa-pause";
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); playIcon.className = "fas fa-pause"; }
            else { audio.pause(); playIcon.className = "fas fa-play"; }
        }

        function nextSong() { playSong((currentIndex + 1) % playlist.length); }
        function prevSong() { playSong((currentIndex - 1 + playlist.length) % playlist.length); }

        audio.ontimeupdate = () => { document.getElementById('prog').value = (audio.currentTime / audio.duration) * 100 || 0; };
        document.getElementById('prog').oninput = function() { audio.currentTime = (this.value * audio.duration) / 100; };
        audio.onended = () => nextSong();

        // OFFLINE DESTEYİ: Service Worker
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'emil-mp3-v1';
                self.addEventListener('install', (e) => {
                    e.waitUntil(caches.open(CACHE_NAME).then((cache) => cache.addAll(['./'])));
                });
                self.addEventListener('fetch', (e) => {
                    e.respondWith(caches.match(e.request).then((res) => res || fetch(e.request)));
                });
            `;
            const blob = new Blob([swCode], { type: 'text/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        // İnternet statusunu yoxla
        window.addEventListener('offline', () => { document.getElementById('statusTitle').innerText = "Kitabxanan (Offline Rejim)"; });
        window.addEventListener('online', () => { document.getElementById('statusTitle').innerText = "Kitabxanan"; });
    </script>
</body>
</html>
